services:
  db:
    image: postgres:15
    container_name: indexer-db
    environment:
      POSTGRES_USER: indexer
      POSTGRES_PASSWORD: indexer
      POSTGRES_DB: indexer
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U indexer"]
      interval: 3s
      timeout: 3s
      retries: 5

  indexer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: indexer-app
    environment:
      RPC_URL: ws://host.docker.internal:8545
      DB_DSN: postgres://indexer:indexer@db:5432/indexer?sslmode=disable
      TOKEN_ADDR: 0x9fE46736679d2D9a65F0992F2272dE9f3c7fa6e0
      TODO_ADDR: 0xCf7Ed3AccA5a467e9e704C703E8D87F634fB0Fc9
      PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  pgdata: